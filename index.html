/* ── Helpers ── */
function poGetSupplier(id) { return SUPPLIERS.find(s => s.id === id); }
function poGetProduct(id)  { return PRODUCTS_LIST.find(p => p.id === id); }
function poCalcTotal(po)   { return po.items.reduce((s, i) => s + i.qty * i.unitPrice, 0); }

function poStatusLabel(status) {
  return { pending: t('statusPending'), received: t('statusReceived'), canceled: t('statusCanceled') }[status] || status;
}

function poFormatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(lang === 'ar' ? 'ar-IQ' : 'en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function poSupplierName(s) {
  return lang === 'ar' ? s.nameAr : s.name;
}
function poSupplierCity(s) {
  return lang === 'ar' ? s.cityAr : s.city;
}

/* ── Render Purchases Screen ── */
function renderPurchases() {
  const list = document.getElementById('po-list');

  // Stats
  const pending   = PO_LIST.filter(p => p.status === 'pending').length;
  const totalVal  = PO_LIST.reduce((s, p) => s + poCalcTotal(p), 0);
  document.getElementById('po-stat-total').textContent   = PO_LIST.length;
  document.getElementById('po-stat-pending').textContent = pending;
  document.getElementById('po-stat-value').textContent   = (totalVal / 1000).toFixed(0) + 'K';

  // Pending chip
  const chip = document.getElementById('po-pending-chip');
  if (pending > 0) {
    chip.style.display = 'flex';
    document.getElementById('po-pending-text').textContent = t('poPendingText', pending);
  } else {
    chip.style.display = 'none';
  }

  // Populate supplier dropdown (idempotent)
  const sel = document.getElementById('npo-supplier-select');
  while (sel.options.length > 1) sel.remove(1);
  SUPPLIERS.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = poSupplierName(s);
    sel.appendChild(opt);
  });

  // Empty state
  if (PO_LIST.length === 0) {
    list.innerHTML = `
      <div class="po-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p><strong>${t('poEmptyTitle')}</strong><br>${t('poEmptyHint')}</p>
      </div>`;
    return;
  }

  // Sort: pending first, then by date desc
  const sorted = [...PO_LIST].sort((a, b) => {
    const statusOrder = { pending: 0, received: 1, canceled: 2 };
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    return b.num - a.num;
  });

  list.innerHTML = sorted.map(po => {
    const sup    = poGetSupplier(po.supplierId);
    const total  = poCalcTotal(po);
    const items  = po.items.length;
    const sName  = sup ? poSupplierName(sup) : po.supplierId;
    const sColor = sup ? sup.color : '#2d3f61';
    const sInit  = sup ? sup.initial : '?';

    return `
    <div class="po-row" onclick="openPODetail('${po.id}')">
      <div class="po-row-main">
        <div class="po-supplier-avatar" style="background:${sColor};">${sInit}</div>
        <div class="po-row-info">
          <div class="po-row-num">#PO-${String(po.num).padStart(3,'0')}</div>
          <div class="po-row-meta">${sName} · ${poFormatDate(po.date)} · <span class="num-ltr">${items}</span> ${t('npoItemsLbl').toLowerCase()}</div>
        </div>
        <div class="po-row-right">
          <div class="po-row-total num-ltr">${total.toLocaleString()} IQD</div>
          <div class="po-status-badge ${po.status}">${poStatusLabel(po.status)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Open PO Detail ── */
function openPODetail(poId) {
  const po  = PO_LIST.find(p => p.id === poId);
  if (!po) return;
  _viewingPO = poId;

  const sup   = poGetSupplier(po.supplierId);
  const total = poCalcTotal(po);

  document.getElementById('pod-num').textContent         = `#PO-${String(po.num).padStart(3,'0')}`;
  document.getElementById('pod-supplier').textContent    = sup ? poSupplierName(sup) : po.supplierId;
  document.getElementById('pod-date').textContent        = poFormatDate(po.date);
  document.getElementById('pod-items-count').textContent = po.items.length;
  document.getElementById('pod-total').textContent       = total.toLocaleString() + ' IQD';

  // Status badge
  const badge = document.getElementById('pod-status-badge');
  badge.textContent  = poStatusLabel(po.status);
  badge.className    = 'po-status-badge ' + po.status;

  // Items breakdown
  document.getElementById('pod-items-breakdown').innerHTML = po.items.map(item => {
    const p = poGetProduct(item.productId);
    const name = p ? (lang === 'ar' ? p.nameAr : p.name) : item.productId;
    return `
    <div class="pod-item-row">
      <div style="width:32px;height:32px;border-radius:8px;background:${p?.color||'#2d3f61'};display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;">${p?.icon||'💊'}</div>
      <div style="flex:1;font-size:0.82rem;font-weight:600;">${name}</div>
      <div class="num-ltr" style="font-size:0.75rem;color:#8899bb;">×${item.qty}</div>
      <div class="num-ltr" style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;color:#00d4aa;min-width:60px;text-align:end;">${(item.qty*item.unitPrice).toLocaleString()} IQD</div>
    </div>`;
  }).join('');

  // Action buttons (only for pending)
  const actionsEl = document.getElementById('pod-actions');
  if (po.status === 'pending') {
    actionsEl.innerHTML = `
      <button class="pod-action-btn pod-btn-receive" onclick="poMarkReceived('${po.id}')">${t('podReceiveBtn')}</button>
      <button class="pod-action-btn pod-btn-cancel"  onclick="poCancelOrder('${po.id}')">${t('podCancelBtn')}</button>`;
  } else {
    actionsEl.innerHTML = '';
  }

  document.getElementById('po-detail-modal').classList.add('open');
}

function closePODetail() {
  document.getElementById('po-detail-modal').classList.remove('open');
  _viewingPO = null;
}
function closePODetailOutside(e) {
  if (e.target === document.getElementById('po-detail-modal')) closePODetail();
}

/* ── Mark Received / Cancel ── */
function poMarkReceived(poId) {
  const po = PO_LIST.find(p => p.id === poId);
  if (!po || po.status !== 'pending') return;
  po.status = 'received';
  closePODetail();
  renderPurchases();
  showToast(t('toastPOReceived', String(po.num).padStart(3,'0')), 'success');
}

function poCancelOrder(poId) {
  const po = PO_LIST.find(p => p.id === poId);
  if (!po || po.status !== 'pending') return;
  po.status = 'canceled';
  closePODetail();
  renderPurchases();
  showToast(t('toastPOCanceled', String(po.num).padStart(3,'0')), 'error');
}

/* ── New PO Modal ── */
function openNewPO(prefillProductId) {
  npoItems    = [];
  npoSupplier = null;
  document.getElementById('npo-supplier-select').value = '';
  document.getElementById('npo-supplier-card').style.display = 'none';
  document.getElementById('npo-notes').value = '';
  document.getElementById('npo-notes').placeholder = t('npoNotesPh');

  // Pre-fill product if called from inventory "Generate PO"
  if (prefillProductId) {
    const p = poGetProduct(prefillProductId);
    if (p) {
      npoItems.push({ productId: p.id, qty: 50, unitPrice: p.price });
    }
  }

  npoRenderItems();
  document.getElementById('new-po-modal').classList.add('open');
}

function closeNewPO() {
  document.getElementById('new-po-modal').classList.remove('open');
}
function closeNewPOOutside(e) {
  if (e.target === document.getElementById('new-po-modal')) closeNewPO();
}

function npoSupplierChanged() {
  const val = document.getElementById('npo-supplier-select').value;
  const sup = SUPPLIERS.find(s => s.id === val);
  npoSupplier = val || null;

  const card = document.getElementById('npo-supplier-card');
  if (sup) {
    document.getElementById('npo-s-avatar').textContent       = sup.initial;
    document.getElementById('npo-s-avatar').style.background  = sup.color;
    document.getElementById('npo-s-name').textContent         = poSupplierName(sup);
    document.getElementById('npo-s-meta').textContent         = poSupplierCity(sup) + ' · ' + sup.phone;
    card.style.display = 'block';
  } else {
    card.style.display = 'none';
  }
}

function npoRenderItems() {
  const el    = document.getElementById('npo-items-list');
  const total = npoItems.reduce((s, i) => s + i.qty * i.unitPrice, 0);
  document.getElementById('npo-total-val').textContent = total.toLocaleString() + ' IQD';

  if (npoItems.length === 0) {
    el.innerHTML = `<div style="font-size:0.75rem;color:#2d3f61;text-align:center;padding:12px 0;">${t('npoAddItemBtn')}</div>`;
    return;
  }

  el.innerHTML = npoItems.map((item, idx) => {
    const p    = poGetProduct(item.productId);
    const name = p ? (lang === 'ar' ? p.nameAr : p.name) : item.productId;
    const line = (item.qty * item.unitPrice).toLocaleString();
    return `
    <div class="npo-item-row">
      <div class="npo-item-icon" style="background:${p?.color||'#2d3f61'};">${p?.icon||'💊'}</div>
      <div class="npo-item-name">${name}</div>
      <div class="npo-item-qty-wrap">
        <button class="npo-qty-btn npo-qty-minus" onclick="npoChangeQty(${idx},-1)">−</button>
        <span class="npo-qty-val num-ltr">${item.qty}</span>
        <button class="npo-qty-btn npo-qty-plus"  onclick="npoChangeQty(${idx},+1)">+</button>
      </div>
      <div class="npo-item-price num-ltr">${line}</div>
      <button class="npo-item-remove" onclick="npoRemoveItem(${idx})">✕</button>
    </div>`;
  }).join('');
}

function npoChangeQty(idx, delta) {
  npoItems[idx].qty = Math.max(1, npoItems[idx].qty + delta);
  npoRenderItems();
}

function npoRemoveItem(idx) {
  npoItems.splice(idx, 1);
  npoRenderItems();
}

/* ── Product Picker (inside New PO) ── */
function npoOpenAddProduct() {
  const picker = document.getElementById('npo-product-picker');
  const list   = document.getElementById('npo-picker-list');

  list.innerHTML = PRODUCTS_LIST.map(p => {
    const name = lang === 'ar' ? p.nameAr : p.name;
    const already = npoItems.find(i => i.productId === p.id);
    return `
    <div class="npo-picker-row" onclick="npoAddProduct('${p.id}')">
      <div style="width:36px;height:36px;border-radius:9px;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">${p.icon}</div>
      <div style="flex:1;">
        <div style="font-size:0.85rem;font-weight:700;">${name}</div>
        <div style="font-size:0.68rem;color:#8899bb;margin-top:1px;" class="num-ltr">${p.price.toLocaleString()} IQD · ${p.stock} ${t('invUnitsLabel')}</div>
      </div>
      ${already ? `<div style="font-size:0.65rem;color:#00d4aa;font-weight:700;">✓ Added</div>` : ''}
    </div>`;
  }).join('');

  picker.style.opacity = '0'; picker.style.pointerEvents = 'none';
  picker.style.display !== 'flex' && (picker.style.display = 'flex');
  requestAnimationFrame(() => {
    picker.style.transition = 'opacity .3s ease';
    picker.style.opacity = '1'; picker.style.pointerEvents = 'all';
  });
}

function npoAddProduct(productId) {
  const p = poGetProduct(productId);
  if (!p) return;
  const existing = npoItems.find(i => i.productId === productId);
  if (existing) { existing.qty += 10; }
  else { npoItems.push({ productId, qty: 50, unitPrice: p.price }); }
  closeNpoPicker();
  npoRenderItems();
}

function closeNpoPicker() {
  const picker = document.getElementById('npo-product-picker');
  picker.style.opacity = '0'; picker.style.pointerEvents = 'none';
}
function closeNpoPickerOutside(e) {
  if (e.target === document.getElementById('npo-product-picker')) closeNpoPicker();
}

/* ── Submit PO ── */
function submitNewPO() {
  if (!npoSupplier) { showToast(t('npoSupplierLbl') + ' required', 'error'); return; }
  if (npoItems.length === 0) { showToast(t('npoAddItemBtn'), 'error'); return; }

  const today = new Date().toISOString().split('T')[0];
  const num   = _poNextNum++;
  const newPO = {
    id:         `PO-${String(num).padStart(3,'0')}`,
    num,
    supplierId: npoSupplier,
    date:       today,
    status:     'pending',
    notes:      document.getElementById('npo-notes').value.trim(),
    items:      npoItems.map(i => ({ ...i })),
  };

  PO_LIST.unshift(newPO);
  closeNewPO();
  renderPurchases();
  showToast(t('toastPOCreated', String(num).padStart(3,'0')), 'success');
}

/* ── Generate PO from Inventory (Phase 2→3 bridge) ── */
function generatePO(productId) {
  switchScreenByName('purchases');
  setTimeout(() => openNewPO(productId), 120);
}

/* ════════════════════════════════════════════
   PHASE 4 — TEAM MANAGEMENT & SETTINGS
════════════════════════════════════════════ */

/* ── Staff role helpers ── */
function staffRoleLabel(role) {
  const map = {
    manager:          { en: 'Store Manager',        ar: 'مدير الفرع' },
    pharmacist:       { en: 'Lead Pharmacist',       ar: 'صيدلاني رئيسي' },
    cashier:          { en: 'Cashier',               ar: 'كاشير' },
    pharmacist_assist:{ en: 'Pharmacist Assistant',  ar: 'مساعد صيدلاني' },
  };
  return (map[role] || { en: role, ar: role })[lang];
}

function staffRoleClass(role) {
  return 'role-' + (role || 'cashier');
}

function staffInitial(name) {
  return (name || '?')[0].toUpperCase();
}

/* ── Update active user chip in topbar ── */
function updateActiveUserChip() {
  const staff = STAFF_LIST.find(s => s.id === activeStaffId);
  if (!staff) return;
  const name = lang === 'ar' ? staff.nameAr : staff.name;
  document.getElementById('auc-avatar').textContent         = staffInitial(name);
  document.getElementById('auc-avatar').style.background   = staff.color;
  document.getElementById('auc-name').textContent           = name;
}

/* ── Render Team Screen ── */
function renderTeam() {
  const list     = document.getElementById('team-list');
  const active   = STAFF_LIST.filter(s => s.active).length;
  const salesToday = STAFF_LIST.reduce((sum, s) => sum + (s.salesToday || 0), 0);

  // Stats
  document.getElementById('team-stat-total').textContent  = STAFF_LIST.length;
  document.getElementById('team-stat-active').textContent = active;
  document.getElementById('team-stat-sales').textContent  = salesToday;

  // Active banner
  const activeStaff = STAFF_LIST.find(s => s.id === activeStaffId);
  if (activeStaff) {
    const name = lang === 'ar' ? activeStaff.nameAr : activeStaff.name;
    document.getElementById('tab-active-avatar').textContent       = staffInitial(name);
    document.getElementById('tab-active-avatar').style.background  = activeStaff.color;
    document.getElementById('tab-active-name').textContent         = name;
    document.getElementById('tab-active-role').textContent         = staffRoleLabel(activeStaff.role);
  }

  list.innerHTML = STAFF_LIST.map(staff => {
    const name    = lang === 'ar' ? staff.nameAr : staff.name;
    const isActive = staff.id === activeStaffId;
    const hubLabel = staff.hub.charAt(0).toUpperCase() + staff.hub.slice(1);
    return `
    <div class="staff-row${isActive ? ' active-row' : ''}">
      <div class="staff-avatar" style="background:${staff.color};">${staffInitial(name)}</div>
      <div class="staff-info">
        <div class="staff-name">${name}</div>
        <div class="staff-meta">
          <span class="staff-role-badge ${staffRoleClass(staff.role)}">${staffRoleLabel(staff.role)}</span>
          &nbsp;<span style="font-size:0.65rem;color:#8899bb;">· ${hubLabel}</span>
        </div>
      </div>
      <div class="staff-sales-badge num-ltr">${staff.salesToday || 0}</div>
      <button class="staff-switch-btn${isActive ? ' active' : ''}" onclick="setActiveStaff('${staff.id}')" title="${isActive ? '✓' : t('ssTitle')}">
        ${isActive
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
        }
      </button>
    </div>`;
  }).join('');
}

/* ── Set Active Staff ── */
function setActiveStaff(staffId) {
  activeStaffId = staffId;
  updateActiveUserChip();
  renderTeam();
  const staff = STAFF_LIST.find(s => s.id === staffId);
  if (staff) showToast(t('toastStaffSwitched', lang === 'ar' ? staff.nameAr : staff.name), 'success');
}

/* ── Add Staff Modal ── */
function openAddStaff() {
  document.getElementById('as-name-input').value = '';
  document.getElementById('as-pin-input').value  = '';
  document.getElementById('as-role-select').selectedIndex = 0;
  document.getElementById('as-hub-select').selectedIndex  = 0;
  document.getElementById('add-staff-modal').classList.add('open');
}

function closeAddStaff() {
  document.getElementById('add-staff-modal').classList.remove('open');
}
function closeAddStaffOutside(e) {
  if (e.target === document.getElementById('add-staff-modal')) closeAddStaff();
}

function submitAddStaff() {
  const name = document.getElementById('as-name-input').value.trim();
  const pin  = document.getElementById('as-pin-input').value.trim();
  const role = document.getElementById('as-role-select').value;
  const hub  = document.getElementById('as-hub-select').value;

  if (!name) { showToast(t('asNameLbl') + ' required', 'error'); return; }
  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) { showToast(t('asPinLbl'), 'error'); return; }

  // Derive Arabic name transliteration placeholder (in production, user would enter it)
  const newStaff = {
    id:         's' + Date.now(),
    name,
    nameAr:     name, // same until AR input is added in a future phase
    role,
    color:      ['#ffd54f','#00d4aa','#90b8ff','#c084fc','#ff8f8f'][STAFF_LIST.length % 5],
    hub,
    pin,
    salesToday: 0,
    active:     true,
  };

  STAFF_LIST.push(newStaff);
  closeAddStaff();
  renderTeam();
  showToast(t('toastStaffAdded', name), 'success');
}

/* ── Staff Switcher (from topbar chip) ── */
function openStaffSwitcher() {
  const listEl = document.getElementById('ss-staff-list');
  listEl.innerHTML = STAFF_LIST.filter(s => s.active).map(staff => {
    const name     = lang === 'ar' ? staff.nameAr : staff.name;
    const isActive = staff.id === activeStaffId;
    return `
    <div class="ss-row${isActive ? ' ss-active' : ''}" onclick="setActiveStaffFromSwitcher('${staff.id}')">
      <div class="staff-avatar" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;background:${staff.color};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.85rem;color:#0a0f1e;">${staffInitial(name)}</div>
      <div style="flex:1;">
        <div style="font-size:0.85rem;font-weight:700;">${name}</div>
        <div style="font-size:0.68rem;color:#8899bb;margin-top:1px;">${staffRoleLabel(staff.role)}</div>
      </div>
      <div class="ss-check${isActive ? '' : ' empty'}">${isActive ? '✓' : ''}</div>
    </div>`;
  }).join('');

  document.getElementById('staff-switcher-modal').classList.add('open');
}

function setActiveStaffFromSwitcher(staffId) {
  closeStaffSwitcher();
  setTimeout(() => setActiveStaff(staffId), 200);
}

function closeStaffSwitcher() {
  document.getElementById('staff-switcher-modal').classList.remove('open');
}
function closeStaffSwitcherOutside(e) {
  if (e.target === document.getElementById('staff-switcher-modal')) closeStaffSwitcher();
}

/* ── Settings ── */
function updatePaymentSetting(method, enabled) {
  paymentSettings[method] = enabled;
}

/* ── Init ── */
// Show HTTPS warning on insecure origins (file://, http://)
(function checkHTTPS() {
  const isSecure = location.protocol === 'https:' ||
                   location.hostname === 'localhost' ||
                   location.hostname === '127.0.0.1';
  if (!isSecure) {
    document.getElementById('https-warning').style.display = 'block';
  }
})();

applyTranslations();
renderCart();
renderInventory();
renderPurchases();
renderTeam();
updateActiveUserChip();
</script>
</body>
