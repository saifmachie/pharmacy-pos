<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PharmaPOS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <!-- Google Fonts: Syne (display) + Noto Sans Arabic (body/bilingual) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:  { DEFAULT: '#00d4aa', dark: '#00a885', light: '#7fffd4' },
            surface: { 1: '#0a0f1e', 2: '#111827', 3: '#1a2235', 4: '#232f46' },
            ink:    { DEFAULT: '#e8f0fe', muted: '#8899bb', faint: '#2d3f61' },
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body:    ['Noto Sans Arabic', 'Syne', 'sans-serif'],
          },
        }
      }
    };
  </script>

  <style>
    :root {
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: #0a0f1e;
      font-family: 'Noto Sans Arabic', 'Syne', sans-serif;
      color: #e8f0fe;
    }

    /* ── App Shell ── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh; width: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      position: relative; overflow: hidden;
    }

    /* ── Topbar ── */
    #topbar {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 10px;
      background: rgba(10,15,30,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 50;
    }

    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem;
            background: linear-gradient(135deg, #00d4aa 30%, #7fffd4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ── Lang Toggle ── */
    .lang-pill {
      display: flex; background: #1a2235; border-radius: 20px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700;
      padding: 4px 12px; border-radius: 16px; border: none; cursor: pointer;
      transition: all .25s ease; color: #8899bb; background: transparent;
      letter-spacing: .05em;
    }
    .lang-btn.active { background: #00d4aa; color: #0a0f1e; }

    /* ── Screens ── */
    #screen-wrap {
      flex: 1; overflow: hidden; position: relative;
    }
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; overflow: hidden;
      opacity: 0; pointer-events: none;
      transition: opacity .2s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── POS Layout ── */
    #pos-screen {
      background: #0a0f1e;
    }

    /* Scanner area */
    #scanner-section {
      flex-shrink: 0;
      position: relative;
      padding: 12px 16px 0;
    }
    #scanner-card {
      background: #111827;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(0,212,170,0.15);
      position: relative;
    }

    /* html5-qrcode container */
    #reader {
      width: 100%;
      min-height: 220px;
      background: #0a0f1e;
      position: relative;
    }
    /* Override html5-qrcode default styles — iOS Safari critical fixes */
    #reader video {
      object-fit: cover !important;
      border-radius: 0 !important;
      /* Prevent iOS Safari from hijacking video into native fullscreen player */
      width: 100% !important;
      height: 100% !important;
      max-height: 240px !important;
      display: block !important;
      /* These mirror the attributes we set via JS observer */
      -webkit-playsinline: true;
    }
    /* Hide the library's own file-upload / image-scan UI — camera only */
    #reader img { display: none !important; }
    #reader__scan_region { border-radius: 0 !important; }
    /* Hide "Scan type" toggle that can expose file picker on mobile */
    #reader__scan_type_change_anchor { display: none !important; }
    #reader__dashboard_section_swaplink { display: none !important; }
    #reader__status_span {
      background: rgba(0,212,170,0.15) !important;
      color: #00d4aa !important;
      font-family: 'Syne', sans-serif !important;
      font-size: 0.75rem !important;
      border-radius: 6px !important;
    }
    #reader__dashboard { background: #111827 !important; padding: 8px 12px !important; }
    #reader__dashboard_section_csr button,
    #reader__dashboard_section_fsr button {
      background: #00d4aa !important;
      color: #0a0f1e !important;
      border: none !important;
      border-radius: 10px !important;
      font-family: 'Syne', sans-serif !important;
      font-weight: 700 !important;
      padding: 8px 20px !important;
      font-size: 0.8rem !important;
      cursor: pointer !important;
    }

    /* Scan overlay corners */
    .scan-overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 10;
    }
    .corner {
      position: absolute; width: 22px; height: 22px;
      border-color: #00d4aa; border-style: solid; border-width: 0;
    }
    .corner.tl { top: 12px; left: 12px; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 6px; }
    .corner.tr { top: 12px; right: 12px; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 6px; }
    .corner.bl { bottom: 12px; left: 12px; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 6px; }
    .corner.br { bottom: 12px; right: 12px; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 6px; }

    /* Scan pulse line */
    @keyframes scan-line {
      0%   { top: 15%; opacity: 1; }
      100% { top: 85%; opacity: 0.4; }
    }
    .scan-line {
      position: absolute; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, #00d4aa, transparent);
      border-radius: 2px;
      animation: scan-line 2s ease-in-out infinite alternate;
    }
    #scanner-card.idle .scan-line { display: none; }

    /* Tap-to-scan placeholder */
    #tap-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 220px; gap: 10px; padding: 20px;
      cursor: pointer;
    }
    #tap-placeholder.hidden { display: none; }

    .scan-icon-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(0,212,170,0.08);
      border: 2px dashed rgba(0,212,170,0.4);
      display: flex; align-items: center; justify-content: center;
      animation: pulse-ring 2.5s ease infinite;
    }
    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,212,170,0.25); }
      50%      { box-shadow: 0 0 0 12px rgba(0,212,170,0); }
    }

    /* Scanner label bar */
    .scanner-label {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 12px;
    }
    .scan-badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: .08em;
      color: #00d4aa; background: rgba(0,212,170,0.12);
      padding: 3px 10px; border-radius: 12px; text-transform: uppercase;
    }
    .scan-count-badge {
      font-size: 0.65rem; font-weight: 600; color: #8899bb;
    }

    /* ── Cart Section ── */
    #cart-section {
      flex: 1; overflow-y: auto; padding: 6px 16px 0;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #cart-section::-webkit-scrollbar { display: none; }

    .cart-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0 8px;
    }
    .cart-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      color: #8899bb; text-transform: uppercase; letter-spacing: .08em;
    }
    .clear-btn {
      font-size: 0.72rem; color: #ff6b6b;
      background: rgba(255,107,107,0.1); border: none;
      padding: 3px 10px; border-radius: 10px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 600;
    }

    /* Cart Item Card */
    .cart-item {
      background: #111827;
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      animation: item-in .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes item-in {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    .item-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-weight: 700; font-size: 0.88rem; color: #e8f0fe;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-meta { font-size: 0.72rem; color: #8899bb; margin-top: 1px; }

    .item-controls {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 8px; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }
    .qty-btn:active { transform: scale(0.88); }
    .qty-minus { background: rgba(255,255,255,0.07); color: #8899bb; }
    .qty-plus  { background: rgba(0,212,170,0.15); color: #00d4aa; }
    .qty-val   {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.9rem; color: #e8f0fe; min-width: 20px; text-align: center;
    }
    .item-price {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.88rem; color: #00d4aa; flex-shrink: 0; text-align: end;
      min-width: 52px;
    }

    /* Empty cart state */
    #empty-cart {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 0; gap: 8px; color: #2d3f61;
    }
    #empty-cart svg { width: 40px; height: 40px; opacity: .4; }
    #empty-cart p { font-size: 0.8rem; font-weight: 600; }

    /* ── Checkout Footer ── */
    #checkout-footer {
      flex-shrink: 0;
      padding: 12px 16px 8px;
      background: rgba(10,15,30,0.95);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .totals-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .totals-label { font-size: 0.78rem; color: #8899bb; font-weight: 600; }
    .totals-label span { display: block; font-size: 0.65rem; color: #2d3f61; margin-top: 1px; }
    .totals-amount {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
      color: #e8f0fe;
    }
    .totals-currency { font-size: 0.75rem; color: #8899bb; font-weight: 600; margin-inline-start: 3px; }

    .checkout-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #00d4aa, #00a885);
      color: #0a0f1e; border: none; border-radius: 16px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
      letter-spacing: .03em; cursor: pointer;
      box-shadow: 0 4px 24px rgba(0,212,170,0.35);
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .checkout-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(0,212,170,0.2); }
    .checkout-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Bottom Nav ── */
    #bottom-nav {
      flex-shrink: 0;
      display: flex; align-items: stretch;
      background: #0d1526;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-bottom: calc(var(--safe-bottom) + 2px);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 4px 6px; gap: 3px;
      cursor: pointer; border: none; background: transparent;
      transition: color .2s ease;
      color: #2d3f61; position: relative;
    }
    .nav-item.active { color: #00d4aa; }
    .nav-item svg { width: 22px; height: 22px; flex-shrink: 0; }
    .nav-label { font-size: 0.6rem; font-weight: 700; letter-spacing: .04em; }
    .nav-dot {
      position: absolute; top: 6px; width: 4px; height: 4px;
      background: #00d4aa; border-radius: 2px;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    .nav-item:not(.active) .nav-dot { transform: scale(0); }
    .nav-item.active .nav-dot { transform: scale(1); }

    /* ── Placeholder Screens ── */
    .placeholder-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      padding: 40px 24px; text-align: center;
    }
    .placeholder-icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: #111827; border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
    }
    .placeholder-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
    }
    .placeholder-sub { font-size: 0.82rem; color: #8899bb; line-height: 1.6; max-width: 260px; }
    .coming-badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: .1em;
      color: #00d4aa; background: rgba(0,212,170,0.1);
      padding: 5px 14px; border-radius: 12px; text-transform: uppercase;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; top: calc(var(--safe-top) + 66px); left: 50%; z-index: 1000;
      transform: translateX(-50%) translateY(-8px);
      background: #1a2235; border: 1px solid rgba(0,212,170,0.3);
      color: #e8f0fe; border-radius: 14px;
      padding: 10px 20px; font-size: 0.82rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success .toast-dot { background: #00d4aa; }
    #toast.error   .toast-dot { background: #ff6b6b; }
    .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Checkout Modal ── */
    #checkout-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity .3s ease;
    }
    #checkout-modal.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; background: #111827;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(var(--safe-bottom) + 24px);
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,1.25,.65,1);
    }
    #checkout-modal.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px; background: #2d3f61;
      border-radius: 2px; margin: 0 auto 20px;
    }
    .modal-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; margin-bottom: 16px;
    }
    .modal-line {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.85rem;
    }
    .modal-line:last-of-type { border-bottom: none; }
    .modal-line .lbl { color: #8899bb; }
    .modal-line .val { font-weight: 700; font-family: 'Syne', sans-serif; }
    .modal-line .val.total { color: #00d4aa; font-size: 1.15rem; }
    .pay-methods { display: flex; gap: 8px; margin: 14px 0; }
    .pay-method {
      flex: 1; padding: 12px 8px; border-radius: 12px; text-align: center;
      border: 2px solid rgba(255,255,255,0.08); cursor: pointer;
      font-size: 0.78rem; font-weight: 700; color: #8899bb;
      background: #1a2235; transition: all .2s;
    }
    .pay-method.selected { border-color: #00d4aa; color: #00d4aa; background: rgba(0,212,170,0.08); }
    .pay-method .pay-icon { font-size: 1.3rem; margin-bottom: 4px; }
    .confirm-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #00d4aa, #00a885);
      color: #0a0f1e; border: none; border-radius: 14px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem;
      cursor: pointer; margin-top: 12px;
      box-shadow: 0 4px 20px rgba(0,212,170,0.3);
      transition: transform .15s, box-shadow .15s;
    }
    .confirm-btn:active { transform: scale(0.97); }

    /* RTL adjustments */
    [dir="rtl"] .item-price { text-align: start; }
    [dir="rtl"] .logo { background: linear-gradient(225deg, #00d4aa 30%, #7fffd4);
                         -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Numeric always LTR */
    .num-ltr { direction: ltr; unicode-bidi: embed; }

    /* ══════════════════════════════════════
       PHASE 2 — INVENTORY STYLES
    ══════════════════════════════════════ */

    /* ── Inventory Screen Layout ── */
    #inventory-screen {
      background: #0a0f1e;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Inventory Header ── */
    .inv-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .inv-header-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem;
      color: #e8f0fe;
    }
    .inv-header-sub {
      font-size: 0.7rem; color: #8899bb; margin-top: 2px;
    }

    /* Alert chip */
    #inv-alert-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255,107,107,0.3);
      color: #ff8f8f;
      padding: 5px 11px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 700;
      animation: chip-pulse 2.5s ease infinite;
    }
    @keyframes chip-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.25); }
      50%      { box-shadow: 0 0 0 6px rgba(255,107,107,0); }
    }

    /* ── Stats Bar ── */
    .inv-stats-bar {
      flex-shrink: 0;
      display: flex; align-items: center;
      background: #111827;
      margin: 10px 16px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 12px 0;
    }
    .inv-stat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
    }
    .inv-stat-val {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
      color: #e8f0fe;
    }
    .inv-stat-val.warn { color: #ff8f8f; }
    .inv-stat-lbl {
      font-size: 0.62rem; font-weight: 600; color: #8899bb;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .inv-stat-divider {
      width: 1px; height: 32px;
      background: rgba(255,255,255,0.07);
    }

    /* ── Inventory List ── */
    #inv-list {
      flex: 1; overflow-y: auto; padding: 0 16px 12px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #inv-list::-webkit-scrollbar { display: none; }

    /* ── Product Row ── */
    .inv-row {
      background: #111827;
      border-radius: 16px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      transition: border-color .3s ease, background .3s ease;
    }
    /* Low-stock state */
    .inv-row.low-stock {
      background: rgba(255, 59, 59, 0.06);
      border-color: rgba(255, 107, 107, 0.35);
    }

    .inv-row-main {
      display: flex; align-items: center;
      gap: 12px; padding: 12px 14px;
    }

    .inv-product-icon {
      width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; position: relative;
    }
    /* Pulsing red dot on low-stock icon */
    .inv-product-icon .low-dot {
      position: absolute; top: -3px; right: -3px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff6b6b;
      border: 2px solid #0a0f1e;
      display: none;
      animation: dot-pulse 1.5s ease infinite;
    }
    .inv-row.low-stock .inv-product-icon .low-dot { display: block; }
    @keyframes dot-pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.3); opacity: .7; }
    }

    .inv-product-info { flex: 1; min-width: 0; }
    .inv-product-name {
      font-weight: 700; font-size: 0.88rem; color: #e8f0fe;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .inv-product-meta {
      font-size: 0.68rem; color: #8899bb; margin-top: 2px;
    }

    /* Stock pill */
    .inv-stock-pill {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; margin-inline-start: 4px;
    }
    .inv-stock-num {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      color: #e8f0fe; line-height: 1;
    }
    .inv-stock-num.low { color: #ff8f8f; }
    .inv-stock-unit {
      font-size: 0.58rem; font-weight: 700; color: #8899bb;
      text-transform: uppercase; letter-spacing: .06em;
    }

    /* Edit stock button */
    .inv-edit-btn {
      flex-shrink: 0; border: none; cursor: pointer;
      background: rgba(0,212,170,0.1);
      color: #00d4aa;
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .15s;
    }
    .inv-edit-btn:active { background: rgba(0,212,170,0.22); transform: scale(0.9); }
    .inv-edit-btn svg { width: 15px; height: 15px; }

    /* ── Low-stock warning bar (inside row) ── */
    .inv-reorder-bar {
      display: none;
      align-items: center; gap: 8px;
      padding: 8px 14px 10px;
      border-top: 1px solid rgba(255,107,107,0.2);
    }
    .inv-row.low-stock .inv-reorder-bar { display: flex; }
    .inv-reorder-badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,107,107,0.15);
      border: 1px solid rgba(255,107,107,0.3);
      color: #ff8f8f;
      font-size: 0.65rem; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      white-space: nowrap;
    }
    .inv-reorder-badge svg { width: 10px; height: 10px; flex-shrink: 0; }
    .inv-reorder-tip {
      font-size: 0.65rem; color: #8899bb; flex: 1;
    }

    /* ── Edit Stock Modal ── */
    #edit-stock-modal {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity .3s ease;
    }
    #edit-stock-modal.open { opacity: 1; pointer-events: all; }
    #edit-stock-modal .modal-sheet { transform: translateY(100%); }
    #edit-stock-modal.open .modal-sheet { transform: translateY(0); }

    /* Adjustment buttons */
    .es-adj-btn {
      padding: 8px 12px; border-radius: 10px; border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
      background: rgba(255,255,255,0.07); color: #8899bb;
      transition: background .15s, transform .15s;
    }
    .es-adj-btn:active { transform: scale(0.9); }
    .es-adj-plus { background: rgba(0,212,170,0.12); color: #00d4aa; }
    #es-exact-input:focus { border-color: rgba(0,212,170,0.5) !important; }

    /* ══════════════════════════════════════
       PHASE 3 — PURCHASE ORDERS STYLES
    ══════════════════════════════════════ */

    /* ── Purchases Screen ── */
    #purchases-screen {
      background: #0a0f1e;
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }

    /* ── PO Header ── */
    .po-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .po-header-title { font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:#e8f0fe; }
    .po-header-sub   { font-size:0.7rem;color:#8899bb;margin-top:2px; }

    #po-pending-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,193,7,0.12); border: 1px solid rgba(255,193,7,0.3);
      color: #ffd54f; padding: 5px 11px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 700;
    }

    /* ── PO Stats Bar ── */
    .po-stats-bar {
      flex-shrink: 0;
      display: flex; align-items: center;
      background: #111827; margin: 10px 16px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05); padding: 12px 0;
    }
    .po-stat { flex:1;display:flex;flex-direction:column;align-items:center;gap:3px; }
    .po-stat-val { font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:#e8f0fe; }
    .po-stat-lbl { font-size:0.62rem;font-weight:600;color:#8899bb;text-transform:uppercase;letter-spacing:.06em; }
    .po-stat-divider { width:1px;height:32px;background:rgba(255,255,255,0.07); }

    /* ── PO List ── */
    #po-list {
      flex:1; overflow-y:auto; padding:0 16px 80px;
      overscroll-behavior:contain; -webkit-overflow-scrolling:touch;
    }
    #po-list::-webkit-scrollbar { display:none; }

    /* empty state */
    .po-empty {
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;padding:40px 20px;color:#2d3f61;text-align:center;
    }
    .po-empty svg { width:44px;height:44px;opacity:.35; }
    .po-empty p   { font-size:0.8rem;font-weight:600;max-width:220px;line-height:1.5; }

    /* ── PO Row Card ── */
    .po-row {
      background:#111827; border-radius:16px; margin-bottom:10px;
      border:1px solid rgba(255,255,255,0.05); overflow:hidden;
      cursor:pointer; transition:border-color .2s,background .2s;
      animation: item-in .3s cubic-bezier(.34,1.56,.64,1);
    }
    .po-row:active { background:#1a2235; }

    .po-row-main { display:flex;align-items:center;gap:12px;padding:12px 14px; }

    .po-supplier-avatar {
      width:42px;height:42px;border-radius:12px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;
      color:#0a0f1e;
    }
    .po-row-info { flex:1;min-width:0; }
    .po-row-num  { font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;color:#e8f0fe; }
    .po-row-meta { font-size:0.68rem;color:#8899bb;margin-top:2px; }
    .po-row-right { flex-shrink:0;text-align:end;display:flex;flex-direction:column;align-items:flex-end;gap:4px; }
    .po-row-total { font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:#e8f0fe; }

    /* Status badges */
    .po-status-badge {
      font-size:0.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      padding:3px 9px;border-radius:20px;
    }
    .po-status-badge.pending  { background:rgba(255,193,7,0.15);color:#ffd54f;border:1px solid rgba(255,193,7,0.3); }
    .po-status-badge.received { background:rgba(0,212,170,0.12);color:#00d4aa;border:1px solid rgba(0,212,170,0.3); }
    .po-status-badge.canceled { background:rgba(255,107,107,0.1);color:#ff8f8f;border:1px solid rgba(255,107,107,0.25); }

    /* ── FAB ── */
    .po-fab {
      position:absolute; bottom:16px; right:16px;
      display:flex;align-items:center;gap:8px;
      background:linear-gradient(135deg,#00d4aa,#00a885);
      color:#0a0f1e;border:none;border-radius:20px;
      padding:13px 20px;
      font-family:'Syne',sans-serif;font-weight:800;font-size:0.88rem;
      box-shadow:0 6px 28px rgba(0,212,170,0.4);
      cursor:pointer;transition:transform .15s,box-shadow .15s;
      z-index:10;
    }
    .po-fab:active { transform:scale(0.95);box-shadow:0 3px 14px rgba(0,212,170,0.25); }
    [dir="rtl"] .po-fab { right:auto;left:16px; }

    /* ── Generate PO button inside inv row ── */
    .inv-gen-po-btn {
      display:flex;align-items:center;gap:5px;
      background:rgba(255,193,7,0.12);border:1px solid rgba(255,193,7,0.3);
      color:#ffd54f;font-size:0.65rem;font-weight:700;
      padding:4px 10px;border-radius:20px;cursor:pointer;
      white-space:nowrap;transition:background .15s;flex-shrink:0;
    }
    .inv-gen-po-btn:active { background:rgba(255,193,7,0.25); }

    /* ── New PO Modal extras ── */
    .po-modal-sheet {
      max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    }
    .po-modal-sheet::-webkit-scrollbar { display:none; }

    #new-po-modal {
      position:fixed;inset:0;z-index:400;
      background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
      display:flex;align-items:flex-end;
      opacity:0;pointer-events:none;transition:opacity .3s ease;
    }
    #new-po-modal.open { opacity:1;pointer-events:all; }
    #new-po-modal .modal-sheet { transform:translateY(100%); }
    #new-po-modal.open .modal-sheet { transform:translateY(0); }

    #po-detail-modal {
      position:fixed;inset:0;z-index:400;
      background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
      display:flex;align-items:flex-end;
      opacity:0;pointer-events:none;transition:opacity .3s ease;
    }
    #po-detail-modal.open { opacity:1;pointer-events:all; }
    #po-detail-modal .modal-sheet { transform:translateY(100%); }
    #po-detail-modal.open .modal-sheet { transform:translateY(0); }

    /* Supplier card inside New PO modal */
    .npo-supplier-card-inner {
      display:flex;align-items:center;gap:12px;
      background:#1a2235;border-radius:12px;padding:10px 14px;
    }
    .npo-supplier-avatar {
      width:38px;height:38px;border-radius:10px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;
      color:#0a0f1e;
    }
    .npo-supplier-name { font-weight:700;font-size:0.85rem;color:#e8f0fe; }
    .npo-supplier-meta { font-size:0.68rem;color:#8899bb;margin-top:2px; }

    .npo-field-group { margin-bottom:12px; }
    .npo-label { font-size:0.72rem;font-weight:700;color:#8899bb;margin-bottom:5px;display:block; }

    .npo-select-wrap { position:relative; }
    .npo-select {
      width:100%;background:#1a2235;border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:11px 36px 11px 14px;color:#e8f0fe;
      font-family:'Syne',sans-serif;font-size:0.88rem;font-weight:600;
      outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;
    }
    .npo-select:focus { border-color:rgba(0,212,170,0.5); }
    .npo-select-arrow {
      position:absolute;top:50%;right:12px;transform:translateY(-50%);
      width:16px;height:16px;color:#8899bb;pointer-events:none;
    }
    [dir="rtl"] .npo-select { padding:11px 14px 11px 36px; }
    [dir="rtl"] .npo-select-arrow { right:auto;left:12px; }

    .npo-textarea {
      width:100%;background:#1a2235;border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:10px 14px;color:#e8f0fe;
      font-family:'Syne',sans-serif;font-size:0.85rem;
      outline:none;resize:none;
    }
    .npo-textarea:focus { border-color:rgba(0,212,170,0.4); }

    .npo-add-item-btn {
      font-size:0.72rem;font-weight:700;color:#00d4aa;
      background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.25);
      padding:5px 12px;border-radius:10px;cursor:pointer;
    }

    /* PO item row inside new-po form */
    .npo-item-row {
      display:flex;align-items:center;gap:10px;
      background:#1a2235;border-radius:12px;padding:10px 12px;
      margin-bottom:8px;
    }
    .npo-item-icon { width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.9rem; }
    .npo-item-name { flex:1;font-size:0.82rem;font-weight:700;color:#e8f0fe; }
    .npo-item-qty-wrap { display:flex;align-items:center;gap:6px; }
    .npo-qty-btn {
      width:26px;height:26px;border-radius:7px;border:none;cursor:pointer;
      font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;
      transition:transform .12s;
    }
    .npo-qty-btn:active { transform:scale(0.85); }
    .npo-qty-minus { background:rgba(255,255,255,0.07);color:#8899bb; }
    .npo-qty-plus  { background:rgba(0,212,170,0.15);color:#00d4aa; }
    .npo-qty-val   { font-family:'Syne',sans-serif;font-weight:800;font-size:0.88rem;min-width:20px;text-align:center; }
    .npo-item-price { font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;color:#00d4aa;min-width:52px;text-align:end; }
    .npo-item-remove { background:none;border:none;color:#8899bb;cursor:pointer;padding:2px;font-size:1rem;flex-shrink:0; }

    /* Picker list rows */
    .npo-picker-row {
      display:flex;align-items:center;gap:12px;padding:12px 4px;
      border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;
      transition:background .15s;
    }
    .npo-picker-row:last-child { border-bottom:none; }
    .npo-picker-row:active { background:rgba(255,255,255,0.04); }

    /* PO detail items breakdown */
    .pod-item-row {
      display:flex;align-items:center;gap:10px;
      padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .pod-item-row:last-child { border-bottom:none; }

    /* PO action buttons in detail view */
    .pod-action-btn {
      flex:1;padding:11px 8px;border-radius:12px;border:none;cursor:pointer;
      font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;
      transition:transform .15s,opacity .15s;
    }
    .pod-action-btn:active { transform:scale(0.95); }
    .pod-btn-receive { background:rgba(0,212,170,0.15);color:#00d4aa; }
    .pod-btn-cancel  { background:rgba(255,107,107,0.1);color:#ff8f8f; }

    /* ══════════════════════════════════════
       PHASE 4 — TEAM & SETTINGS STYLES
    ══════════════════════════════════════ */

    /* ── Team Screen ── */
    #team-screen { background:#0a0f1e;display:flex;flex-direction:column;overflow:hidden; }

    .team-header {
      flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .team-header-title { font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:#e8f0fe; }
    .team-header-sub   { font-size:0.7rem;color:#8899bb;margin-top:2px; }
    .team-add-btn {
      display:flex;align-items:center;gap:5px;
      background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.25);
      color:#00d4aa;font-size:0.72rem;font-weight:700;
      padding:6px 12px;border-radius:10px;cursor:pointer;
    }

    /* Stats bar */
    .team-stats-bar {
      flex-shrink:0;display:flex;align-items:center;
      background:#111827;margin:10px 16px;border-radius:14px;
      border:1px solid rgba(255,255,255,0.05);padding:12px 0;
    }
    .team-stat { flex:1;display:flex;flex-direction:column;align-items:center;gap:3px; }
    .team-stat-val { font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:#e8f0fe; }
    .team-stat-lbl { font-size:0.62rem;font-weight:600;color:#8899bb;text-transform:uppercase;letter-spacing:.06em; }
    .team-stat-divider { width:1px;height:32px;background:rgba(255,255,255,0.07); }

    /* Active session banner */
    #team-active-banner {
      flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
      margin:0 16px 10px;padding:10px 14px;
      background:rgba(0,212,170,0.06);
      border:1px solid rgba(0,212,170,0.2);
      border-radius:12px;
    }

    /* Team list */
    #team-list {
      flex:1;overflow-y:auto;padding:0 16px 12px;
      overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    }
    #team-list::-webkit-scrollbar { display:none; }

    /* Staff row */
    .staff-row {
      background:#111827;border-radius:16px;margin-bottom:8px;
      border:1px solid rgba(255,255,255,0.05);
      display:flex;align-items:center;gap:12px;padding:12px 14px;
      animation:item-in .3s cubic-bezier(.34,1.56,.64,1);
    }
    .staff-row.active-row { border-color:rgba(0,212,170,0.3);background:rgba(0,212,170,0.04); }

    .staff-avatar {
      width:42px;height:42px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#0a0f1e;
    }
    .staff-info { flex:1;min-width:0; }
    .staff-name { font-weight:700;font-size:0.88rem;color:#e8f0fe; }
    .staff-meta { font-size:0.68rem;color:#8899bb;margin-top:2px; }
    .staff-sales-badge {
      font-size:0.62rem;font-weight:700;color:#00d4aa;
      background:rgba(0,212,170,0.1);padding:2px 8px;border-radius:8px;
      font-family:'Syne',sans-serif;
    }
    .staff-switch-btn {
      flex-shrink:0;border:none;cursor:pointer;
      background:rgba(255,255,255,0.07);color:#8899bb;
      width:34px;height:34px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:0.75rem;transition:background .15s,color .15s;
    }
    .staff-switch-btn.active { background:rgba(0,212,170,0.15);color:#00d4aa; }
    .staff-switch-btn:active { transform:scale(0.9); }

    /* Staff role badge */
    .staff-role-badge {
      font-size:0.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      padding:2px 7px;border-radius:8px;display:inline-block;margin-top:3px;
    }
    .role-manager     { background:rgba(255,193,7,0.12);color:#ffd54f; }
    .role-pharmacist  { background:rgba(0,212,170,0.1);color:#00d4aa; }
    .role-cashier     { background:rgba(100,160,255,0.1);color:#90b8ff; }
    .role-pharmacist_assist { background:rgba(180,100,255,0.1);color:#c084fc; }

    /* Add Staff & Staff Switcher modals */
    #add-staff-modal {
      position:fixed;inset:0;z-index:400;
      background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
      display:flex;align-items:flex-end;
      opacity:0;pointer-events:none;transition:opacity .3s ease;
    }
    #add-staff-modal.open { opacity:1;pointer-events:all; }
    #add-staff-modal .modal-sheet { transform:translateY(100%); }
    #add-staff-modal.open .modal-sheet { transform:translateY(0); }

    #staff-switcher-modal {
      position:fixed;inset:0;z-index:400;
      background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
      display:flex;align-items:flex-end;
      opacity:0;pointer-events:none;transition:opacity .3s ease;
    }
    #staff-switcher-modal.open { opacity:1;pointer-events:all; }
    #staff-switcher-modal .modal-sheet { transform:translateY(100%); }
    #staff-switcher-modal.open .modal-sheet { transform:translateY(0); }

    /* Switcher rows */
    .ss-row {
      display:flex;align-items:center;gap:12px;padding:12px 4px;
      border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;
      transition:background .15s;
    }
    .ss-row:last-child { border-bottom:none; }
    .ss-row:active { background:rgba(255,255,255,0.04); }
    .ss-row.ss-active { background:rgba(0,212,170,0.06); }
    .ss-check { width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.7rem;background:rgba(0,212,170,0.15);color:#00d4aa; }
    .ss-check.empty { background:rgba(255,255,255,0.07);color:transparent; }

    /* ── Settings Screen ── */
    #settings-screen { background:#0a0f1e;display:flex;flex-direction:column;overflow:hidden; }
    #settings-scroll { flex:1;overflow-y:auto;padding:14px 16px 24px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch; }
    #settings-scroll::-webkit-scrollbar { display:none; }

    .settings-section-title {
      font-size:0.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:#8899bb;padding:0 2px;margin-bottom:8px;margin-top:4px;
    }

    /* Plan card */
    .settings-plan-card {
      background:linear-gradient(135deg,#0f2d1e,#1a3a2a);
      border:1px solid rgba(0,212,170,0.25);border-radius:16px;
      padding:14px 16px;margin-bottom:8px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .settings-plan-icon { font-size:1.4rem;flex-shrink:0; }
    .settings-plan-name { font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;color:#e8f0fe; }
    .settings-plan-status { font-size:0.68rem;color:#00d4aa;margin-top:2px; }
    .settings-plan-badge {
      font-family:'Syne',sans-serif;font-weight:800;font-size:0.65rem;
      letter-spacing:.12em;color:#0a0f1e;
      background:linear-gradient(135deg,#00d4aa,#7fffd4);
      padding:4px 10px;border-radius:8px;
    }

    /* Settings cards */
    .settings-card {
      background:#111827;border-radius:16px;
      border:1px solid rgba(255,255,255,0.05);
      overflow:hidden;margin-bottom:8px;
    }
    .settings-row {
      display:flex;align-items:center;justify-content:space-between;
      padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.05);
      gap:12px;
    }
    .settings-row-label { font-size:0.75rem;color:#8899bb;font-weight:600;flex-shrink:0; }
    .settings-row-val   { font-size:0.78rem;font-weight:700;color:#e8f0fe; }
    .settings-row-title { font-size:0.85rem;font-weight:700;color:#e8f0fe; }
    .settings-row-sub   { font-size:0.68rem;color:#8899bb;margin-top:2px; }

    /* Toggle switch */
    .toggle-switch { position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0; }
    .toggle-switch input { opacity:0;width:0;height:0; }
    .toggle-slider {
      position:absolute;cursor:pointer;inset:0;
      background:#2d3f61;border-radius:26px;
      transition:background .25s;
    }
    .toggle-slider:before {
      content:'';position:absolute;
      height:20px;width:20px;left:3px;bottom:3px;
      background:#fff;border-radius:50%;
      transition:transform .25s;
    }
    input:checked + .toggle-slider { background:#00d4aa; }
    input:checked + .toggle-slider:before { transform:translateX(18px); }

    /* Active user chip on topbar */
    #active-user-chip { transition:border-color .2s; }
    #active-user-chip:active { opacity:.8; }</head>

<body>
<div id="app">

  <!-- ══ HTTPS WARNING (hidden on secure origins) ══ -->
  <div id="https-warning" style="display:none;flex-shrink:0;background:#ff6b6b;color:#0a0f1e;font-family:'Syne',sans-serif;font-weight:700;font-size:0.72rem;text-align:center;padding:8px 16px;line-height:1.5;z-index:100;">
    ⚠️ Camera requires HTTPS. Open this page via GitHub Pages or another HTTPS URL — not a local file or http:// link.
  </div>

  <!-- ══ TOPBAR ══ -->
  <header id="topbar">
    <div class="logo" id="app-logo">PharmaPOS</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="hub-badge" style="font-size:.65rem;font-weight:700;color:#8899bb;background:#1a2235;padding:3px 10px;border-radius:10px;" class="num-ltr">Baghdad Hub</div>
      <!-- Active user chip — tapping opens staff-switcher -->
      <button id="active-user-chip" onclick="openStaffSwitcher()" style="display:flex;align-items:center;gap:6px;background:#1a2235;border:1px solid rgba(0,212,170,0.2);border-radius:20px;padding:4px 10px 4px 6px;cursor:pointer;outline:none;">
        <div id="auc-avatar" style="width:22px;height:22px;border-radius:50%;background:#00a885;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.65rem;color:#0a0f1e;flex-shrink:0;"></div>
        <span id="auc-name" style="font-size:0.68rem;font-weight:700;color:#e8f0fe;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      </button>
    </div>
  </header>

  <!-- ══ SCREENS ══ -->
  <div id="screen-wrap">

    <!-- POS Screen -->
    <div class="screen active" id="pos-screen">

      <!-- Scanner Section -->
      <div id="scanner-section">
        <div id="scanner-card" class="idle">
          <!-- Tap-to-scan placeholder -->
          <div id="tap-placeholder" onclick="startScanner()">
            <div class="scan-icon-ring">
              <svg viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" width="32" height="32">
                <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
                <rect x="7" y="7" width="3" height="3" rx="1" fill="#00d4aa" stroke="none"/>
                <rect x="14" y="7" width="3" height="3" rx="1" fill="#00d4aa" stroke="none"/>
                <rect x="7" y="14" width="3" height="3" rx="1" fill="#00d4aa" stroke="none"/>
                <rect x="14" y="14" width="3" height="3" rx="1" fill="#2d3f61" stroke="none"/>
              </svg>
            </div>
            <div>
              <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;text-align:center;" id="tap-label">Tap to Scan</div>
              <div style="font-size:.7rem;color:#8899bb;text-align:center;margin-top:2px;" id="tap-sub">Point camera at barcode or QR</div>
            </div>
          </div>

          <!-- html5-qrcode mounts here -->
          <div id="reader" class="hidden"></div>

          <!-- Corner overlay + scan line (shown when active) -->
          <div class="scan-overlay" id="scan-overlay" style="display:none;">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="scan-line"></div>
          </div>
        </div>

        <!-- Label bar below scanner -->
        <div class="scanner-label">
          <div class="scan-badge" id="scanner-status-badge">READY</div>
          <button id="stop-scan-btn" onclick="stopScanner()" style="display:none;font-size:.7rem;font-weight:700;color:#ff6b6b;background:rgba(255,107,107,.1);border:none;padding:4px 12px;border-radius:10px;cursor:pointer;" id-label="stop-label">■ Stop</button>
          <div class="scan-count-badge num-ltr" id="scan-count-badge">0 items scanned</div>
        </div>
      </div>

      <!-- Cart Section -->
      <div id="cart-section">
        <div class="cart-header">
          <div class="cart-title" id="cart-title-label">Invoice</div>
          <button class="clear-btn" onclick="clearCart()" id="clear-btn">Clear All</button>
        </div>

        <div id="empty-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/>
          </svg>
          <p id="empty-label">Scan a product to start the invoice</p>
        </div>

        <div id="cart-items"></div>
      </div>

      <!-- Checkout Footer -->
      <div id="checkout-footer">
        <div class="totals-row">
          <div class="totals-label">
            <span id="total-label">Total</span>
            <span id="total-sub">IQD · incl. VAT</span>
          </div>
          <div>
            <span class="totals-amount num-ltr" id="total-display">0</span>
            <span class="totals-currency">IQD</span>
          </div>
        </div>
        <button class="checkout-btn" onclick="openCheckout()" id="checkout-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
            <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="checkout-label">Checkout</span>
        </button>
      </div>
    </div><!-- /pos-screen -->

    <!-- ══ INVENTORY SCREEN (Phase 2) ══ -->
    <div class="screen" id="inventory-screen">

      <!-- Inventory Header -->
      <div class="inv-header">
        <div>
          <div class="inv-header-title" id="inv-screen-title">Inventory</div>
          <div class="inv-header-sub" id="inv-screen-sub">Stock levels &amp; re-order</div>
        </div>
        <!-- Low-stock alert chip — shown when any product is critical -->
        <div id="inv-alert-chip" style="display:none;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span id="inv-alert-text">Low stock</span>
        </div>
      </div>

      <!-- Stats bar -->
      <div class="inv-stats-bar">
        <div class="inv-stat">
          <div class="inv-stat-val num-ltr" id="stat-total-skus">0</div>
          <div class="inv-stat-lbl" id="stat-skus-lbl">SKUs</div>
        </div>
        <div class="inv-stat-divider"></div>
        <div class="inv-stat">
          <div class="inv-stat-val num-ltr" id="stat-total-units">0</div>
          <div class="inv-stat-lbl" id="stat-units-lbl">Total Units</div>
        </div>
        <div class="inv-stat-divider"></div>
        <div class="inv-stat">
          <div class="inv-stat-val warn num-ltr" id="stat-low-count">0</div>
          <div class="inv-stat-lbl" id="stat-low-lbl">Low Stock</div>
        </div>
      </div>

      <!-- Product list -->
      <div id="inv-list"></div>

    </div><!-- /inventory-screen -->

    <!-- ══ PURCHASES SCREEN (Phase 3) ══ -->
    <div class="screen" id="purchases-screen">

      <!-- Purchases Header -->
      <div class="po-header">
        <div>
          <div class="po-header-title" id="po-screen-title">Purchase Orders</div>
          <div class="po-header-sub" id="po-screen-sub">Supplier orders &amp; history</div>
        </div>
        <div id="po-pending-chip" style="display:none;">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
          <span id="po-pending-text">0 pending</span>
        </div>
      </div>

      <!-- PO Stats bar -->
      <div class="po-stats-bar">
        <div class="po-stat">
          <div class="po-stat-val num-ltr" id="po-stat-total">0</div>
          <div class="po-stat-lbl" id="po-stat-total-lbl">Total POs</div>
        </div>
        <div class="po-stat-divider"></div>
        <div class="po-stat">
          <div class="po-stat-val num-ltr" id="po-stat-pending">0</div>
          <div class="po-stat-lbl" id="po-stat-pending-lbl">Pending</div>
        </div>
        <div class="po-stat-divider"></div>
        <div class="po-stat">
          <div class="po-stat-val num-ltr" id="po-stat-value">0</div>
          <div class="po-stat-lbl" id="po-stat-value-lbl">Total IQD</div>
        </div>
      </div>

      <!-- PO List -->
      <div id="po-list"></div>

      <!-- FAB: Create New PO -->
      <button class="po-fab" onclick="openNewPO(null)" id="po-fab-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="22" height="22">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span id="po-fab-label">New PO</span>
      </button>

    </div><!-- /purchases-screen -->

    <!-- ══ TEAM SCREEN (Phase 4) ══ -->
    <div class="screen" id="team-screen">

      <div class="team-header">
        <div>
          <div class="team-header-title" id="team-screen-title">Team</div>
          <div class="team-header-sub" id="team-screen-sub">Staff &amp; access control</div>
        </div>
        <button class="team-add-btn" onclick="openAddStaff()" id="team-add-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span id="team-add-lbl">Add Staff</span>
        </button>
      </div>

      <!-- Team stats -->
      <div class="team-stats-bar">
        <div class="team-stat">
          <div class="team-stat-val num-ltr" id="team-stat-total">0</div>
          <div class="team-stat-lbl" id="team-stat-total-lbl">Staff</div>
        </div>
        <div class="team-stat-divider"></div>
        <div class="team-stat">
          <div class="team-stat-val num-ltr" id="team-stat-active">0</div>
          <div class="team-stat-lbl" id="team-stat-active-lbl">Active</div>
        </div>
        <div class="team-stat-divider"></div>
        <div class="team-stat">
          <div class="team-stat-val num-ltr" id="team-stat-sales">0</div>
          <div class="team-stat-lbl" id="team-stat-sales-lbl">Sales Today</div>
        </div>
      </div>

      <!-- Active session banner -->
      <div id="team-active-banner">
        <div style="display:flex;align-items:center;gap:10px;">
          <div id="tab-active-avatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:#0a0f1e;flex-shrink:0;"></div>
          <div>
            <div style="font-size:0.8rem;font-weight:700;" id="tab-active-name"></div>
            <div style="font-size:0.65rem;color:#8899bb;" id="tab-active-role"></div>
          </div>
        </div>
        <div style="font-size:0.65rem;color:#00d4aa;font-weight:700;" id="tab-active-status-lbl">● Active Session</div>
      </div>

      <!-- Staff list -->
      <div id="team-list"></div>

    </div><!-- /team-screen -->

    <!-- ══ SETTINGS SCREEN (Phase 4) ══ -->
    <div class="screen" id="settings-screen">
      <div id="settings-scroll">

        <div class="settings-section-title" id="set-section-plan">Subscription</div>

        <!-- SaaS plan card -->
        <div class="settings-plan-card">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="settings-plan-icon">⭐</div>
            <div>
              <div class="settings-plan-name" id="set-plan-name">Premium Tier</div>
              <div class="settings-plan-status" id="set-plan-status">● Active · Renews Jan 2027</div>
            </div>
          </div>
          <div class="settings-plan-badge" id="set-plan-badge">PRO</div>
        </div>

        <!-- Pharmacy info row -->
        <div class="settings-card" style="margin-bottom:16px;">
          <div class="settings-row">
            <span class="settings-row-label" id="set-pharmacy-lbl">Pharmacy</span>
            <span class="settings-row-val">Al-Amal Pharmacy</span>
          </div>
          <div class="settings-row" style="border-bottom:none;">
            <span class="settings-row-label" id="set-hub-lbl">Hub</span>
            <span class="settings-row-val num-ltr">Baghdad · Branch 1</span>
          </div>
        </div>

        <div class="settings-section-title" id="set-section-payment">Payment Methods</div>
        <div class="settings-card" style="margin-bottom:16px;">
          <div class="settings-row">
            <div>
              <div class="settings-row-title" id="set-cash-title">Cash</div>
              <div class="settings-row-sub" id="set-cash-sub">Accept physical banknotes</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-cash" checked onchange="updatePaymentSetting('cash', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="settings-row">
            <div>
              <div class="settings-row-title" id="set-qi-title">Qi Card</div>
              <div class="settings-row-sub" id="set-qi-sub">Iraqi electronic payment card</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-qi" checked onchange="updatePaymentSetting('qi', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="settings-row" style="border-bottom:none;">
            <div>
              <div class="settings-row-title" id="set-transfer-title">Bank Transfer</div>
              <div class="settings-row-sub" id="set-transfer-sub">Direct bank or mobile transfer</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-transfer" checked onchange="updatePaymentSetting('transfer', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="settings-section-title" id="set-section-lang">Language</div>
        <div class="settings-card" style="margin-bottom:16px;">
          <div class="settings-row" style="border-bottom:none;">
            <div>
              <div class="settings-row-title" id="set-lang-title">App Language</div>
              <div class="settings-row-sub" id="set-lang-sub">Interface and content language</div>
            </div>
            <div class="lang-pill">
              <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
              <button class="lang-btn"        onclick="setLang('ar')" id="btn-ar">ع</button>
            </div>
          </div>
        </div>

        <div class="settings-section-title" id="set-section-app">App</div>
        <div class="settings-card" style="margin-bottom:24px;">
          <div class="settings-row">
            <div>
              <div class="settings-row-title" id="set-version-title">Version</div>
              <div class="settings-row-sub">PharmaPOS v4.0 · Phase 4</div>
            </div>
            <span class="settings-row-val num-ltr">4.0.0</span>
          </div>
          <div class="settings-row" style="border-bottom:none;">
            <div>
              <div class="settings-row-title" id="set-firebase-title">Firebase Sync</div>
              <div class="settings-row-sub" id="set-firebase-sub">Cloud backend connection</div>
            </div>
            <span style="font-size:0.7rem;font-weight:700;color:#ffd54f;" id="set-firebase-status">Phase 5</span>
          </div>
        </div>

      </div>
    </div><!-- /settings-screen -->

  </div><!-- /screen-wrap -->

  <!-- ══ BOTTOM NAV ══ -->
  <nav id="bottom-nav">
    <button class="nav-item active" onclick="switchScreen('pos',this)" data-screen="pos">
      <div class="nav-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav-label" id="nav-pos">POS</span>
    </button>
    <button class="nav-item" onclick="switchScreen('inventory',this)" data-screen="inventory">
      <div class="nav-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zM16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
      </svg>
      <span class="nav-label" id="nav-inv">Stock</span>
    </button>
    <button class="nav-item" onclick="switchScreen('purchases',this)" data-screen="purchases">
      <div class="nav-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="nav-label" id="nav-pur">Orders</span>
    </button>
    <button class="nav-item" onclick="switchScreen('team',this)" data-screen="team">
      <div class="nav-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <span class="nav-label" id="nav-team">Team</span>
    </button>
    <button class="nav-item" onclick="switchScreen('settings',this)" data-screen="settings">
      <div class="nav-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      <span class="nav-label" id="nav-set">Settings</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- ══ TOAST ══ -->
<div id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<!-- ══ CHECKOUT MODAL ══ -->
<div id="checkout-modal" onclick="closeCheckoutOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Confirm Payment</div>

    <div class="modal-line">
      <span class="lbl" id="modal-items-lbl">Items</span>
      <span class="val num-ltr" id="modal-items-val">0</span>
    </div>
    <div class="modal-line">
      <span class="lbl" id="modal-sub-lbl">Subtotal</span>
      <span class="val num-ltr" id="modal-sub-val">0 IQD</span>
    </div>
    <div class="modal-line">
      <span class="lbl" id="modal-vat-lbl">VAT (0%)</span>
      <span class="val num-ltr">0 IQD</span>
    </div>
    <div class="modal-line">
      <span class="lbl" id="modal-total-lbl" style="font-weight:700;color:#e8f0fe;">Total</span>
      <span class="val total num-ltr" id="modal-total-val">0 IQD</span>
    </div>

    <div class="pay-methods">
      <div class="pay-method selected" id="pay-cash" onclick="selectPayment('cash')">
        <div class="pay-icon">💵</div>
        <div id="pay-cash-lbl">Cash</div>
      </div>
      <div class="pay-method" id="pay-qi" onclick="selectPayment('qi')">
        <div class="pay-icon">💳</div>
        <div id="pay-qi-lbl">Qi Card</div>
      </div>

/* ── Scanner ── */

/**
 * iOS Safari REQUIRES three attributes on any <video> that streams camera
 * input inline (i.e. not in the native fullscreen player):
 *   playsinline  — keeps video inside the page instead of going fullscreen
 *   muted        — required for autoplay policies
 *   autoplay     — starts the stream without a user gesture on the video element
 *
 * html5-qrcode creates the <video> element internally AFTER .start() resolves,
 * so we can't set these before the call. We use a MutationObserver to watch
 * the #reader container and patch the element the instant it appears.
 */
let _videoObserver = null;

function patchVideoForIOS(readerEl) {
  // Disconnect any previous observer
  if (_videoObserver) { _videoObserver.disconnect(); _videoObserver = null; }

  function applyAttrs(video) {
    video.setAttribute('playsinline', '');       // ← key iOS fix #1
    video.setAttribute('webkit-playsinline', ''); // ← legacy Safari compat
    video.setAttribute('muted', '');             // ← key iOS fix #2
    video.setAttribute('autoplay', '');          // ← key iOS fix #3
    video.muted = true;                          // also set the IDL property
    // Ensure inline styling doesn't override our CSS max-height
    video.style.maxHeight = '240px';
    video.style.width = '100%';
    video.style.objectFit = 'cover';
  }

  // Patch any <video> already present (unlikely but safe)
  readerEl.querySelectorAll('video').forEach(applyAttrs);

  // Watch for the library injecting <video> dynamically
  _videoObserver = new MutationObserver(mutations => {
    for (const m of mutations) {
      m.addedNodes.forEach(node => {
        if (node.nodeName === 'VIDEO') applyAttrs(node);
        // Also check subtree (library may wrap in a div)
        if (node.querySelectorAll) node.querySelectorAll('video').forEach(applyAttrs);
      });
    }
  });
  _videoObserver.observe(readerEl, { childList: true, subtree: true });
}

function startScanner() {
  // Block immediately if not on HTTPS (camera will silently fail on iOS)
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    showToast('⚠️ HTTPS required for camera', 'error');
    return;
  }

  document.getElementById('tap-placeholder').classList.add('hidden');
  document.getElementById('reader').classList.remove('hidden');
  document.getElementById('scan-overlay').style.display = 'block';
  document.getElementById('stop-scan-btn').style.display = 'block';
  document.getElementById('scanner-status-badge').textContent = t('scannerActive');
  scanning = true;

  const readerEl = document.getElementById('reader');

  // Start the MutationObserver BEFORE calling .start() so we never miss the
  // <video> element being injected by the library.
  patchVideoForIOS(readerEl);

  scanner = new Html5Qrcode('reader', {
    // Suppress the verbose library logs in production
    verbose: false,
    // experimentalFeatures.useBarCodeDetectorIfSupported leverages the
    // native BarcodeDetector API on Chrome/Android for faster scanning
    experimentalFeatures: { useBarCodeDetectorIfSupported: true },
  });

  const config = {
    fps: 10,
    qrbox: { width: Math.min(window.innerWidth - 80, 220), height: 160 },
    aspectRatio: 1.5,
    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
    // videoConstraints mirrors the exact getUserMedia call — 'environment'
    // selects the rear camera on iOS without needing getCameras() (which
    // triggers a second permission dialog on some iOS versions).
    videoConstraints: {
      facingMode: { ideal: 'environment' },
      width:  { ideal: 1280 },
      height: { ideal: 720 },
    },
  };

  // Use facingMode object directly — avoids getCameras() which causes a
  // double permission prompt on iOS 16+ and fails on some iPhone models.
  scanner.start(
    { facingMode: { ideal: 'environment' } },
    config,
    onScanSuccess,
    () => {} // per-frame decode errors are normal — suppress them
  ).catch(err => {
    console.error('Scanner start error:', err);
    const msg = String(err);
    if (/permission|denied/i.test(msg)) {
      showToast('Camera permission denied', 'error');
    } else if (/https|secure/i.test(msg)) {
      showToast('⚠️ HTTPS required for camera', 'error');
    } else {
      showToast('Camera unavailable', 'error');
    }
    stopScanner();
  });
}

function stopScanner() {
  if (_videoObserver) { _videoObserver.disconnect(); _videoObserver = null; }
  if (scanner && scanning) {
    scanner.stop().catch(() => {}).finally(() => {
      scanner = null;
      scanning = false;
      document.getElementById('tap-placeholder').classList.remove('hidden');
      document.getElementById('reader').classList.add('hidden');
      document.getElementById('scan-overlay').style.display = 'none';
      document.getElementById('stop-scan-btn').style.display = 'none';
      document.getElementById('scanner-status-badge').textContent = t('scannerReady');
    });
  }
}

function onScanSuccess(decodedText) {
  // Brief debounce — ignore repeat scans within 1.5s
  if (onScanSuccess._lastCode === decodedText && Date.now() - onScanSuccess._lastTime < 1500) return;
  onScanSuccess._lastCode = decodedText;
  onScanSuccess._lastTime = Date.now();

  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate(60);

  addToCart(decodedText);
}
onScanSuccess._lastCode = null;
onScanSuccess._lastTime = 0;

/* ── Cart Logic ── */
function addToCart(barcode) {
  const product = PRODUCTS[barcode];
  if (!product) {
    showToast(t('toastNotFound'), 'error');
    return;
  }

  const existing = cart.find(i => i.product.id === product.id);
  if (existing) {
    existing.qty++;
    showToast(t('toastExists', lang === 'ar' ? product.nameAr : product.name), 'success');
  } else {
    cart.push({ product, qty: 1 });
    showToast(t('toastScanned', lang === 'ar' ? product.nameAr : product.name), 'success');
  }

  renderCart();
  updateScanCountBadge();
}

function removeFromCart(id) {
  cart = cart.filter(i => i.product.id !== id);
  renderCart();
  updateScanCountBadge();
}

function changeQty(id, delta) {
  const item = cart.find(i => i.product.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { removeFromCart(id); return; }
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
  updateScanCountBadge();
}

function getTotal() {
  return cart.reduce((sum, i) => sum + i.product.price * i.qty, 0);
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const empty     = document.getElementById('empty-cart');
  const checkBtn  = document.getElementById('checkout-btn');
  const total     = getTotal();

  document.getElementById('total-display').textContent = total.toLocaleString();
  checkBtn.disabled = cart.length === 0;

  if (cart.length === 0) {
    empty.style.display = 'flex';
    container.innerHTML = '';

  empty.style.display = 'none';

  container.innerHTML = cart.map(({ product, qty }) => {
    const name = lang === 'ar' ? product.nameAr : product.name;
    const lineTotal = (product.price * qty).toLocaleString();
    return `
    <div class="cart-item" id="ci-${product.id}">
      <div class="item-icon" style="background:${product.color};">${product.icon}</div>

function updateScanCountBadge() {

  document.getElementById('scan-count-badge').textContent = t('itemsScanned', total);
}

/* ── Checkout Modal ── */
function openCheckout() {
  if (cart.length === 0) return;
  const total = getTotal();
  const items = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('modal-items-val').textContent = items;
  document.getElementById('modal-sub-val').textContent   = total.toLocaleString() + ' IQD';
  document.getElementById('modal-total-val').textContent = total.toLocaleString() + ' IQD';

  // Show/hide payment methods based on Settings toggles
  ['cash','qi','transfer'].forEach(m => {
    const el = document.getElementById('pay-' + m);
    el.style.display = paymentSettings[m] ? '' : 'none';
  });
  // Auto-select first enabled method
  const firstEnabled = ['cash','qi','transfer'].find(m => paymentSettings[m]);
  if (firstEnabled && !paymentSettings[selectedPayment]) selectPayment(firstEnabled);

  document.getElementById('checkout-modal').classList.add('open');
}

function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('open');
}

function closeCheckoutOutside(e) {
  if (e.target === document.getElementById('checkout-modal')) closeCheckout();
}

function selectPayment(method) {
  selectedPayment = method;
  ['cash','qi','transfer'].forEach(m => {
    document.getElementById('pay-' + m).classList.toggle('selected', m === method);
  });
}

function confirmSale() {
  // Log the active staff member against this sale
  const staff = STAFF_LIST.find(s => s.id === activeStaffId);
  if (staff) staff.salesToday = (staff.salesToday || 0) + 1;
  closeCheckout();
  setTimeout(() => {
    const staffName = staff ? (lang === 'ar' ? staff.nameAr : staff.name) : '';
    showToast(staffName ? t('toastSaleWithStaff', t('toastSaleComplete'), staffName) : t('toastSaleComplete'), 'success');
    clearCart();
    renderTeam(); // update salesToday counter
  }, 300);
}

/* ── Toast ── */
let _toastTimer = null;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);

}

/* ── Re-Order Assistant ──
   Continuously checks all stock levels.
   Any product below LOW_STOCK_THRESHOLD gets flagged.
   Called after every stock change and on tab switch.        */
function checkReorderAlerts() {
  const lowProducts = PRODUCTS_LIST.filter(p => p.stock < LOW_STOCK_THRESHOLD);
  const chip = document.getElementById('inv-alert-chip');
  const alertText = document.getElementById('inv-alert-text');

  if (lowProducts.length > 0) {
    chip.style.display = 'flex';
    alertText.textContent = t('invAlertText', lowProducts.length);

  document.getElementById('stat-total-units').textContent = totalUnits;
  document.getElementById('stat-low-count').textContent   = lowProducts.length;
}

/* ── Edit Stock Modal ── */
function openEditStock(productId) {
  const p = PRODUCTS_LIST.find(x => x.id === productId);
  if (!p) return;

  esProductId = productId;
  esDelta     = 0;

  // Populate modal
  document.getElementById('es-icon').style.background = p.color;
  document.getElementById('es-icon').textContent      = p.icon;
  document.getElementById('es-name').textContent      = lang === 'ar' ? p.nameAr : p.name;
  document.getElementById('es-barcode').textContent   = p.barcode;
  document.getElementById('es-current-val').textContent = p.stock;
  document.getElementById('es-exact-input').value     = '';
  esRefreshDisplay(p);

  document.getElementById('edit-stock-modal').classList.add('open');
}

function esRefreshDisplay(p) {
  const prod = p || PRODUCTS_LIST.find(x => x.id === esProductId);
  const newTotal = Math.max(0, prod.stock + esDelta);
  const sign = esDelta >= 0 ? '+' : '';

  document.getElementById('es-delta-display').textContent = sign + esDelta;
  document.getElementById('es-delta-display').style.color = esDelta < 0 ? '#ff8f8f' : '#00d4aa';
  document.getElementById('es-new-total-val').textContent = newTotal + ' ' + t('invUnitsLabel');
  document.getElementById('es-new-total-val').style.color = newTotal < LOW_STOCK_THRESHOLD ? '#ff8f8f' : '#00d4aa';
}

function esAdjust(delta) {
  const p = PRODUCTS_LIST.find(x => x.id === esProductId);
  if (!p) return;
  // Clamp so new total never goes below 0
  const proposed = p.stock + esDelta + delta;
  if (proposed < 0) return;
  esDelta += delta;
  document.getElementById('es-exact-input').value = '';
  esRefreshDisplay(p);
}

function esSetExact(val) {
  const p = PRODUCTS_LIST.find(x => x.id === esProductId);
  if (!p) return;
  const n = parseInt(val, 10);
  if (isNaN(n) || n < 0) return;
  esDelta = n - p.stock;
  esRefreshDisplay(p);
}

function confirmEditStock() {
  const p = PRODUCTS_LIST.find(x => x.id === esProductId);
  if (!p) return;
  p.stock = Math.max(0, p.stock + esDelta);
  closeEditStock();
  renderInventory();
  showToast(t('toastStockSaved', lang === 'ar' ? p.nameAr : p.name), 'success');
}

function closeEditStock() {
  document.getElementById('edit-stock-modal').classList.remove('open');
  esProductId = null;
  esDelta     = 0;
}

function closeEditStockOutside(e) {
  if (e.target === document.getElementById('edit-stock-modal')) closeEditStock();
}
